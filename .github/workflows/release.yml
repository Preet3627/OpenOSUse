name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build and release (e.g. v0.1.0)'
        required: true
        type: string

env:
  APP_NAME: OpenOSUse
  PROJECT_DIR: OpenOSUse
  RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
  RELEASE_NOTES: release-notes/${{ inputs.tag || github.ref_name }}.md

jobs:
  build:
    name: Build and Release
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Build Swift App
        run: |
          cd ${{ env.PROJECT_DIR }}
          xcodebuild \
            -project ${{ env.APP_NAME }}.xcodeproj \
            -scheme ${{ env.APP_NAME }} \
            -configuration Release \
            -derivedDataPath build \
            build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build Gateway Server
        run: |
          cd ${{ env.PROJECT_DIR }}/server
          npm ci
          npm run build

      - name: Create DMG
        run: |
          APP_PATH="${{ env.PROJECT_DIR }}/build/Build/Products/Release/${{ env.APP_NAME }}.app"
          DMG_NAME="${{ env.APP_NAME }}-${{ env.RELEASE_TAG }}.dmg"
          create-dmg \
            --volname "${{ env.APP_NAME }} ${{ env.RELEASE_TAG }}" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --app-drop-link 400 185 \
            --icon "${{ env.APP_NAME }}" 200 185 \
            --no-internet-enable \
            "$DMG_NAME" \
            "$APP_PATH"

      - name: Prepare Release Notes
        run: |
          if [ -f "${{ env.RELEASE_NOTES }}" ]; then
            echo "Using existing release notes: ${{ env.RELEASE_NOTES }}"
          else
            echo "## ${{ env.APP_NAME }} ${{ env.RELEASE_TAG }}" > "${{ env.RELEASE_NOTES }}"
            echo "" >> "${{ env.RELEASE_NOTES }}"
            echo "See the [CHANGELOG](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details." >> "${{ env.RELEASE_NOTES }}"
          fi

      - name: Create Release Archive
        run: |
          mkdir -p release-artifacts
          cp -R "${{ env.PROJECT_DIR }}/build/Build/Products/Release/${{ env.APP_NAME }}.app" release-artifacts/
          cp -R "${{ env.PROJECT_DIR }}/server/dist" release-artifacts/gateway-server
          cp CHANGELOG.md release-artifacts/
          cp ${{ env.RELEASE_NOTES }} release-artifacts/
          cd release-artifacts
          zip -r "../${{ env.APP_NAME }}-${{ env.RELEASE_TAG }}.zip" .

      - name: Create or Update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${{ env.RELEASE_TAG }}" > /dev/null 2>&1; then
            echo "Release ${{ env.RELEASE_TAG }} exists — uploading assets"
            gh release upload "${{ env.RELEASE_TAG }}" \
              "${{ env.APP_NAME }}-${{ env.RELEASE_TAG }}.dmg" \
              "${{ env.APP_NAME }}-${{ env.RELEASE_TAG }}.zip" \
              --clobber
          else
            echo "Creating release ${{ env.RELEASE_TAG }}"
            gh release create "${{ env.RELEASE_TAG }}" \
              --title "${{ env.APP_NAME }} ${{ env.RELEASE_TAG }}" \
              --notes-file ${{ env.RELEASE_NOTES }} \
              "${{ env.APP_NAME }}-${{ env.RELEASE_TAG }}.dmg" \
              "${{ env.APP_NAME }}-${{ env.RELEASE_TAG }}.zip"
          fi
