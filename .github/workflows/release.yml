name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build and Release
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Build Swift App
        run: |
          cd OpenOSUse
          xcodebuild \
            -project OpenOSUse.xcodeproj \
            -scheme OpenOSUse \
            -configuration Release \
            -derivedDataPath build \
            build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build Gateway Server
        run: |
          cd OpenOSUse/server
          npm ci
          npm run build

      - name: Create Release Archive
        run: |
          mkdir -p release-artifacts
          cp -R OpenOSUse/build/Build/Products/Release/OpenOSUse.app release-artifacts/
          cp -R OpenOSUse/server/dist release-artifacts/gateway-server
          cp CHANGELOG.md release-artifacts/
          cp release-notes/v0.1.1.md release-artifacts/
          cd release-artifacts
          zip -r ../OpenOSUse-v0.1.1.zip .

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "OpenOSUse ${{ github.ref_name }}" \
            --notes-file release-notes/v0.1.1.md \
            OpenOSUse-v0.1.1.zip
